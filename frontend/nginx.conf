# ----------------------------------------------------
# Configuración Nginx - Frontend
# Sirve la app React y hace proxy de /api/* hacia el backend
# El nombre 'backend' se resuelve por DNS interno de la red Docker
# ----------------------------------------------------
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Soporte para rutas SPA (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso hacia el contenedor backend
    # 'backend' es el nombre del servicio en docker-compose.yml
    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Compresión gzip para mejor rendimiento
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
